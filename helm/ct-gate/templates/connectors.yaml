{{/* ── Siemens S7 Connector ──────────────────────────────────────────────── */}}
{{- if .Values.connectors.siemensS7.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-connector-siemens-s7
  labels:
    {{- include "ct-gate.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.connectors.siemensS7.replicas }}
  selector:
    matchLabels:
      {{- include "ct-gate.selectorLabels" (dict "component" "connector-siemens-s7" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ct-gate.selectorLabels" (dict "component" "connector-siemens-s7" "Release" .Release) | nindent 8 }}
    spec:
      containers:
        - name: siemens-s7
          image: {{ .Values.connectors.siemensS7.image.repository }}:{{ .Values.connectors.siemensS7.image.tag }}
          imagePullPolicy: {{ .Values.connectors.siemensS7.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.connectors.siemensS7.port }}
          env:
            - name: PORT
              value: {{ .Values.connectors.siemensS7.port | quote }}
          resources:
            {{- toYaml .Values.connectors.siemensS7.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.connectors.siemensS7.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-connector-siemens-s7
  labels:
    {{- include "ct-gate.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "ct-gate.selectorLabels" (dict "component" "connector-siemens-s7" "Release" .Release) | nindent 4 }}
  ports:
    - port: {{ .Values.connectors.siemensS7.port }}
      targetPort: {{ .Values.connectors.siemensS7.port }}
{{- end }}

