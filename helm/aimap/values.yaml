namespace: maen-ct-gate

# AIMAP Backend API
backend:
  enabled: true
  image: aimap-backend:latest
  port: 3000
  replicas: 1
  env:
    DATABASE_URL: postgresql://aimap:aimap@aimap-postgres:5432/aimap
    SIEMENS_S7_URL: http://siemens-s7:8300
    SIEMENS_OPCUA_URL: http://siemens-browser:8200
    ROCKWELL_URL: http://rockwell-connector:8100
    UPLOAD_PATH: /app/uploads
    OLLAMA_URL: http://aimap-ollama:11434
    OLLAMA_MODEL: llama3.1:8b
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# AIMAP Frontend
frontend:
  enabled: true
  image: aimap-frontend:latest
  port: 80
  replicas: 1
  ingress:
    enabled: true
    className: traefik
    host: aimap.ct-ind.com
    path: /

# AIMAP Collector/Writer
collector:
  enabled: true
  image: aimap-collector:latest
  replicas: 1
  env:
    BACKEND_URL: http://aimap-backend:3000
    POLL_INTERVAL: "1000"

# PostgreSQL
postgres:
  enabled: true
  image: postgres:16-alpine
  storage: 10Gi
  env:
    POSTGRES_USER: aimap
    POSTGRES_PASSWORD: aimap
    POSTGRES_DB: aimap

# Ollama (local LLM – no internet, no API costs)
ollama:
  enabled: true
  image: ollama/ollama:latest
  port: 11434
  model: llama3.1:8b
  storage: 10Gi
  resources:
    requests:
      memory: 8Gi
      cpu: "2"
    limits:
      memory: 16Gi
      cpu: "4"
    # GPU optional but recommended:
    # nvidia.com/gpu: 1

# Existing connectors (unchanged)
siemensS7:
  enabled: true
siemensBrowser:
  enabled: true
rockwell:
  enabled: true
