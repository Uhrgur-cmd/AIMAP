{{- if .Values.collector.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aimap-collector
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.collector.replicas }}
  selector:
    matchLabels:
      app: aimap-collector
  template:
    metadata:
      labels:
        app: aimap-collector
    spec:
      containers:
        - name: collector
          image: {{ .Values.collector.image }}
          env:
            {{- range $key, $value := .Values.collector.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
{{- end }}
