{{- if .Values.ollama.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aimap-ollama
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aimap-ollama
  template:
    metadata:
      labels:
        app: aimap-ollama
    spec:
      containers:
        - name: ollama
          image: {{ .Values.ollama.image }}
          ports:
            - containerPort: {{ .Values.ollama.port }}
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: {{ .Values.ollama.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /api/tags
              port: {{ .Values.ollama.port }}
            initialDelaySeconds: 15
            periodSeconds: 60
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: aimap-ollama-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aimap-ollama-pvc
  namespace: {{ .Values.namespace }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.ollama.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: aimap-ollama
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: aimap-ollama
  ports:
    - port: {{ .Values.ollama.port }}
      targetPort: {{ .Values.ollama.port }}
  type: ClusterIP
{{- end }}
