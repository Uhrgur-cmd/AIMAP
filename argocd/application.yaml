apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ct-gate
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/your-org/ct-gate.git   # ← update
    targetRevision: main
    path: helm/ct-gate

    helm:
      valueFiles:
        - values.yaml
        # overlay per environment, e.g. values-edge.yaml
        # - values-edge.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: ct-gate

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
