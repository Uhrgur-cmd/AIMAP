{{- if .Values.siemensS7.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: siemens-s7
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector: { matchLabels: { app: siemens-s7 } }
  template:
    metadata:
      labels: { app: siemens-s7 }
    spec:
      containers:
        - name: app
          image: {{ .Values.siemensS7.image | quote }}
          imagePullPolicy: IfNotPresent
          ports: [ { containerPort: {{ .Values.siemensS7.port }}, name: http } ]
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources: {{- toYaml .Values.siemensS7.resources | nindent 12 }}
      nodeSelector: {{- toYaml .Values.siemensS7.nodeSelector | nindent 8 }}
      tolerations: {{- toYaml .Values.siemensS7.tolerations | nindent 8 }}
      affinity: {{- toYaml .Values.siemensS7.affinity | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: siemens-s7
  namespace: {{ .Values.namespace }}
spec:
  selector: { app: siemens-s7 }
  ports:
    - name: http
      port: {{ .Values.siemensS7.port }}
      targetPort: http
{{- end }}