{{- if .Values.rockwell.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rockwell-connector
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector: { matchLabels: { app: rockwell-connector } }
  template:
    metadata:
      labels: { app: rockwell-connector }
    spec:
      containers:
        - name: app
          image: {{ .Values.rockwell.image | quote }}
          imagePullPolicy: IfNotPresent
          ports: [ { containerPort: {{ .Values.rockwell.port }}, name: http } ]
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources: {{- toYaml .Values.rockwell.resources | nindent 12 }}
      nodeSelector: {{- toYaml .Values.rockwell.nodeSelector | nindent 8 }}
      tolerations: {{- toYaml .Values.rockwell.tolerations | nindent 8 }}
      affinity: {{- toYaml .Values.rockwell.affinity | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: rockwell-connector
  namespace: {{ .Values.namespace }}
spec:
  selector: { app: rockwell-connector }
  ports:
    - name: http
      port: {{ .Values.rockwell.port }}
      targetPort: http
{{- end }}