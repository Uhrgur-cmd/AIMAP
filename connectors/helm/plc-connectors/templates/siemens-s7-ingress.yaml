{{- if .Values.siemensS7.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: siemens-s7
  namespace: {{ .Values.namespace }}
  labels:
    app: siemens-s7
  annotations:
    {{- with .Values.siemensS7.ingress.annotations }}
{{ toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.siemensS7.ingress.middlewares.enabled }}
    traefik.ingress.kubernetes.io/router.middlewares: >
      {{ .Values.namespace }}-{{ .Values.siemensS7.ingress.middlewares.strip.name }}@kubernetescrd
      {{- if .Values.siemensS7.ingress.middlewares.apiKey.enabled }}
      ,{{ .Values.namespace }}-{{ .Values.siemensS7.ingress.middlewares.apiKey.name }}@kubernetescrd
      {{- end }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.siemensS7.ingress.className | default "traefik" }}
  rules:
    - host: {{ .Values.siemensS7.ingress.host }}
      http:
        paths:
          - path: {{ .Values.siemensS7.ingress.path | default "/s7" }}
            pathType: {{ .Values.siemensS7.ingress.pathType | default "Prefix" }}
            backend:
              service:
                name: siemens-s7
                port:
                  number: {{ .Values.siemensS7.port }}
  {{- if .Values.siemensS7.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.siemensS7.ingress.host }}
      {{- if .Values.siemensS7.ingress.tls.secretName }}
      secretName: {{ .Values.siemensS7.ingress.tls.secretName }}
      {{- end }}
  {{- end }}
{{- end }}