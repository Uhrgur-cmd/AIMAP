{{- if and .Values.siemensBrowser.ingress.enabled .Values.siemensBrowser.ingress.middlewares.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Values.siemensBrowser.ingress.middlewares.strip.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: siemens-browser
spec:
  stripPrefix:
    prefixes:
{{ toYaml .Values.siemensBrowser.ingress.middlewares.strip.prefixes | nindent 6 }}
---
{{- if .Values.siemensBrowser.ingress.middlewares.apiKey.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Values.siemensBrowser.ingress.middlewares.apiKey.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: siemens-browser
spec:
  headers:
    customRequestHeaders:
      X-API-Key: {{ .Values.siemensBrowser.ingress.middlewares.apiKey.key | quote }}
{{- end }}
{{- end }}